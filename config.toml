[i2c]
address = 0x40
path = "/dev/i2c-1"

[pwm]
prescale = 110

[mav]
port = 14550

[controls]
steering = 0
throttle = 1

# Steering
[[channel]]
pwm_channel = 0
min = 250
max = 550
neutral = 400
mavlink_channel = 1
max_step = 25

# Throttle
[[channel]]
pwm_channel = 1
min = 200
max = 600
neutral = 400
mavlink_channel = 3
max_step = 10
